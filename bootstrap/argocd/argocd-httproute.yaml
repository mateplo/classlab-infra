# Expose l'UI ArgoCD via le Gateway `classlab`. Co-localisée avec le bootstrap
# argocd (kustomize). argocd-server est en mode insecure (patch ci-contre) : le
# Gateway termine le TLS -> HTTP simple cote backend, pas de boucle de redirection.
# group/kind/weight + matches = defauts injectes par l'API (declares pour eviter la derive).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: classlab
      namespace: kube-system
      sectionName: https
  hostnames:
    - argocd.classlab.lan
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: argocd-server
          port: 80
          weight: 1
