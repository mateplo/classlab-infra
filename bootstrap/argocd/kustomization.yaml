apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Installation d'ArgoCD depuis la base kustomize upstream, pinnée sur une version.
# Cette même base est ensuite gérée par l'Application `argocd` (self-management),
# de sorte qu'ArgoCD se maintient lui-même via GitOps après le bootstrap initial.
resources:
  - github.com/argoproj/argo-cd/manifests/cluster-install?ref=v3.4.4
