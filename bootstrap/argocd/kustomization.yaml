apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Installation d'ArgoCD depuis la base kustomize upstream, pinnée sur une version.
# Cette même base est ensuite gérée par l'Application `argocd` (self-management),
# de sorte qu'ArgoCD se maintient lui-même via GitOps après le bootstrap initial.
resources:
  - github.com/argoproj/argo-cd/manifests/cluster-install?ref=v3.4.4
  - argocd-httproute.yaml           # expose l'UI ArgoCD via le Gateway `classlab`
  - argocd-servicemonitors.yaml     # ServiceMonitors des composants ArgoCD (Prometheus)

# argocd-server derrière le Gateway `classlab` qui TERMINE le TLS : on passe
# argocd-server en HTTP simple (insecure) pour éviter la boucle de redirection
# HTTP->HTTPS. Le TLS externe reste assuré par le Gateway (cert wildcard interne).
patches:
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cmd-params-cm
      data:
        server.insecure: "true"

  # Limites mémoire sur les composants ArgoCD (l'install upstream n'en pose aucune).
  # Objectif lab : conso plafonnée et prévisible pour rester compatible d'un downgrade
  # à 4 Go/nœud. Pas de limite CPU (2 cœurs -> éviter le throttling).
  - patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: argocd-application-controller
      spec:
        template:
          spec:
            containers:
              - name: argocd-application-controller
                resources:
                  requests:
                    memory: 256Mi
                  # Pic au warm-up (charge tous les manifestes + grosses CRD kube-prometheus-stack).
                  # Idle ~250-350Mi ; 1Gi de marge pour éviter l'OOM au (re)démarrage.
                  limits:
                    memory: 1Gi
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-repo-server
      spec:
        template:
          spec:
            containers:
              - name: argocd-repo-server
                resources:
                  requests:
                    memory: 96Mi
                  limits:
                    memory: 384Mi
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-server
      spec:
        template:
          spec:
            containers:
              - name: argocd-server
                resources:
                  requests:
                    memory: 64Mi
                  limits:
                    memory: 256Mi
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-applicationset-controller
      spec:
        template:
          spec:
            containers:
              - name: argocd-applicationset-controller
                resources:
                  requests:
                    memory: 64Mi
                  limits:
                    memory: 192Mi
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-notifications-controller
      spec:
        template:
          spec:
            containers:
              - name: argocd-notifications-controller
                resources:
                  requests:
                    memory: 64Mi
                  limits:
                    memory: 128Mi
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-redis
      spec:
        template:
          spec:
            containers:
              - name: redis
                resources:
                  requests:
                    memory: 32Mi
                  limits:
                    memory: 128Mi
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-dex-server
      spec:
        template:
          spec:
            containers:
              - name: dex
                resources:
                  requests:
                    memory: 32Mi
                  limits:
                    memory: 128Mi
