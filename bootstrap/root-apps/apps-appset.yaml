apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: udagram
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  # Un environnement = un élément, lié à UNE branche du repo de code :
  #   dev <- branche dev, staging <- branche staging, prod <- branche master/main.
  # allowTags = le préfixe de tag que cet env accepte (produit par la CID de sa branche).
  # Chaque env pointe vers son overlay kustomize dans le repo APP (dual-repo).
  generators:
    - list:
        elements:
          - env: dev
            allowTags: "regexp:^dev-"
          - env: staging
            allowTags: "regexp:^staging-"
          - env: prod
            allowTags: "regexp:^(master|main)-"

  template:
    metadata:
      name: "udagram-{{ .env }}"
      namespace: argocd
      labels:
        app.kubernetes.io/managed-by: applicationset
      annotations:
        # --- Argo CD Image Updater ---
        argocd-image-updater.argoproj.io/image-list: >-
          frontend=ghcr.io/mateplo/udagram-frontend,
          user=ghcr.io/mateplo/udagram-restapi-user,
          feed=ghcr.io/mateplo/udagram-restapi-feed,
          filter=ghcr.io/mateplo/udagram-restapi-image-filter
        # Stratégie : garder la dernière image BUILDÉE parmi les tags autorisés.
        argocd-image-updater.argoproj.io/frontend.update-strategy: newest-build
        argocd-image-updater.argoproj.io/user.update-strategy: newest-build
        argocd-image-updater.argoproj.io/feed.update-strategy: newest-build
        argocd-image-updater.argoproj.io/filter.update-strategy: newest-build
        # Filtre par branche : cet env n'épingle QUE les tags de sa branche.
        argocd-image-updater.argoproj.io/frontend.allow-tags: "{{ .allowTags }}"
        argocd-image-updater.argoproj.io/user.allow-tags: "{{ .allowTags }}"
        argocd-image-updater.argoproj.io/feed.allow-tags: "{{ .allowTags }}"
        argocd-image-updater.argoproj.io/filter.allow-tags: "{{ .allowTags }}"
        # Write-back : commit du nouveau tag dans le bloc images: du kustomization.
        argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-creds
        argocd-image-updater.argoproj.io/write-back-target: kustomization
        argocd-image-updater.argoproj.io/git-branch: main
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/mateplo/classlab-k8s.git
        targetRevision: main
        path: "overlays/{{ .env }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "classlab-code-{{ .env }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 10
          backoff:
            duration: 15s
            factor: 2
            maxDuration: 5m
