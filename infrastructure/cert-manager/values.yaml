# CRD installées et conservées par le chart (pas de gestion CRD séparée).
crds:
  enabled: true
  keep: true

replicaCount: 1

resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    memory: 128Mi

webhook:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

cainjector:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi

# --- Monitoring ---
# ServiceMonitor pour Prometheus (métriques du controller + webhook cert-manager).
# prometheus.enabled=true par défaut ; on active le ServiceMonitor. NB : servicemonitor
# et podmonitor sont mutuellement exclusifs côté chart (n'en activer qu'un).
prometheus:
  enabled: true
  servicemonitor:
    enabled: true
