# Opérateur CloudNativePG uniquement (couche plateforme).
# Les objets `Cluster` PostgreSQL applicatifs sont déclarés dans les repos des apps,
# pas ici. Rappel : le stockage par défaut `local-path` est node-local.
replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 100Mi
  limits:
    memory: 200Mi

monitoring:
  # PodMonitor pour Prometheus. Créé seulement si la CRD monitoring.coreos.com existe
  # (fournie par kube-prometheus-stack). Prometheus le découvre car
  # podMonitorSelectorNilUsesHelmValues=false dans kube-prometheus-stack.
  podMonitorEnabled: true
  # Dashboard CNPG livré par le chart sous forme de ConfigMap `cnpg-grafana-dashboard`
  # (namespace cnpg-system, label sidecar `grafana_dashboard: "1"`). Ramassé par le
  # sidecar Grafana grâce à `sidecar.dashboards.searchNamespace: ALL` (cf. kube-prometheus-stack).
  grafanaDashboard:
    create: true
