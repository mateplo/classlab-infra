# Gateway partagé pour tout le cluster. Les HTTPRoute de n'importe quel namespace
# peuvent s'y attacher (allowedRoutes: All). TLS terminé avec un certificat wildcard
# signé par la CA interne (ClusterIssuer internal-ca).
#
# Domaine lab : classlab.lan → mapper sur l'IP MetalLB de Traefik (192.168.56.240)
# dans /etc/hosts des postes clients.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-classlab
  namespace: kube-system
spec:
  secretName: wildcard-classlab-tls
  duration: 2160h    # 90 jours
  renewBefore: 360h  # 15 jours
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
    - classlab.lan
    - "*.classlab.lan"
  issuerRef:
    name: internal-ca
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: classlab
  namespace: kube-system
spec:
  gatewayClassName: traefik
  # IMPORTANT : le port d'un listener Gateway doit matcher le port d'un entryPoint Traefik.
  # Les entryPoints de k3s-Traefik sont web=:8000 et websecure=:8443 (exposés en 80/443
  # par le Service). On met donc 8000/8443 ici, PAS 80/443, sinon -> PortUnavailable.
  # Le trafic externe reste en 80/443 (IP MetalLB 192.168.56.240).
  listeners:
    - name: http
      protocol: HTTP
      port: 8000
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 8443
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""          # défaut ajouté par l'API — le déclarer évite une dérive perpétuelle ArgoCD
            kind: Secret
            name: wildcard-classlab-tls
      allowedRoutes:
        namespaces:
          from: All
