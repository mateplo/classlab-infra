# Traefik est déployé par k3s via l'addon HelmChart. On ne le réinstalle pas :
# on le CONFIGURE via HelmChartConfig pour activer le provider Gateway API.
# On désactive la GatewayClass / le Gateway auto-créés par le chart : on les gère nous-mêmes.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    providers:
      kubernetesGateway:
        enabled: true
    gateway:
      enabled: false
    gatewayClass:
      enabled: false
    # Métriques Prometheus : service dédié + ServiceMonitor (découvert par Prometheus).
    # Le point d'entrée `metrics` est activé par défaut par le chart ; on expose le
    # service et on crée le ServiceMonitor (CRD fournie par kube-prometheus-stack).
    metrics:
      prometheus:
        service:
          enabled: true
        serviceMonitor:
          enabled: true
