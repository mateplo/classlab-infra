apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: classlab
      namespace: kube-system
      sectionName: https
  hostnames:
    - argocd.classlab.lan
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
