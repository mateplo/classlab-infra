# NB : group/kind/weight et le bloc matches sont les valeurs par défaut injectées
# par l'API Gateway. On les déclare explicitement pour éviter une dérive ArgoCD.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: classlab
      namespace: kube-system
      sectionName: https           # listener HTTPS 8443 (TLS wildcard interne)
  hostnames:
    - grafana.classlab.lan
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: kube-prometheus-stack-grafana
          port: 80
          weight: 1
