# Configuration MetalLB (le déploiement MetalLB lui-même est un prérequis k3s hors-GitOps).
# Ces CR reprennent EXACTEMENT l'existant (pool-1 / k3s-l2) pour qu'ArgoCD les adopte
# sans provoquer de churn.
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: pool-1
  namespace: metallb-system
spec:
  autoAssign: true
  avoidBuggyIPs: false
  addresses:
    - 192.168.56.240-192.168.56.250
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: k3s-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - pool-1
