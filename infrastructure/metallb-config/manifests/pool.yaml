# Configuration réseau de MetalLB (le contrôleur est installé par le composant
# `metallb` en wave 0 ; ce pool est appliqué en wave 1, une fois les CRD présentes).
#
# ⚠️⚠️ POINT DE RÉGLAGE PAR ENVIRONNEMENT ⚠️⚠️
# En mode L2, les IP ci-dessous DOIVENT appartenir au même sous-réseau L2 que les
# nœuds (MetalLB y répond aux ARP). Sur un autre réseau, ADAPTE la plage puis push :
# les services LoadBalancer restent injoignables sinon.
#   ex. nœuds en 10.0.0.0/24  →  10.0.0.240-10.0.0.250
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: pool-1
  namespace: metallb-system
spec:
  autoAssign: true
  avoidBuggyIPs: false
  addresses:
    - 192.168.56.240-192.168.56.250   # ← À ADAPTER au sous-réseau de tes nœuds
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: k3s-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - pool-1
