# Identifiants admin Grafana, chiffrés pour le contrôleur sealed-secrets de CE cluster.
# Le contrôleur déchiffre en un Secret `grafana-admin` (ns monitoring, clés admin-user /
# admin-password) que le chart Grafana lit via `admin.existingSecret` (cf. values.yaml).
# Résout la dérive du mot de passe aléatoire régénéré à chaque sync ArgoCD.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  encryptedData:
    admin-password: 
    admin-user: 
  template:
    metadata:
      name: grafana-admin
      namespace: monitoring
    type: Opaque
