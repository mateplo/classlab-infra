# kube-prometheus-stack, profil lab k3s.

# --- Composants du control-plane non exposés/scrapables sur k3s : désactivés ---
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false

# --- Prometheus ---
prometheus:
  prometheusSpec:
    retention: 7d
    # Découvre les ServiceMonitor/PodMonitor de tous les namespaces, pas seulement ceux du release.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

# --- Alertmanager ---
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        memory: 128Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

# --- Grafana ---
grafana:
  # Mot de passe admin lu depuis le Secret `grafana-admin` (déchiffré par sealed-secrets,
  # cf. manifests/grafana-admin-sealedsecret.yaml). Le chart ne génère donc plus de mot de
  # passe aléatoire à chaque sync ArgoCD -> plus de dérive entre le Secret et la base Grafana.
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  defaultDashboardsTimezone: browser
  # Le sidecar dashboards scanne TOUS les namespaces : chaque composant d'infra livre
  # son propre dashboard sous forme de ConfigMap (label `grafana_dashboard: "1"`) dans
  # son namespace, sans avoir à les centraliser dans `monitoring`. Le chart ajoute
  # automatiquement le ClusterRole de lecture des ConfigMap cluster-wide au sidecar.
  sidecar:
    dashboards:
      searchNamespace: ALL
  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  # Datasource Loki ajoutée automatiquement (Prometheus l'est déjà par le chart).
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.monitoring.svc.cluster.local:3100
