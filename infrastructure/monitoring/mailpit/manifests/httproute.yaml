# UI Mailpit exposée sur le Gateway partagé `classlab`, comme Grafana/Prometheus.
# -> https://mailpit.classlab.lan (ajouter l'entrée DNS/hosts vers l'IP du Gateway).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mailpit
  namespace: monitoring
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: classlab
      namespace: kube-system
      sectionName: https
  hostnames:
    - mailpit.classlab.lan
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: mailpit
          port: 8025
          weight: 1
