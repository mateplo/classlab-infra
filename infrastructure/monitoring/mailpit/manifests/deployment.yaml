# Mailpit : SMTP (:1025, sans auth ni TLS) pour recevoir les mails d'Alertmanager,
# et UI web (:8025) pour les consulter comme une vraie boîte de réception.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  namespace: monitoring
  labels:
    app.kubernetes.io/name: mailpit
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mailpit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mailpit
    spec:
      containers:
        - name: mailpit
          image: axllent/mailpit:v1.30.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: smtp
              containerPort: 1025
            - name: http
              containerPort: 8025
          env:
            # Plafonne la rétention (inbox de démo, stockée en mémoire, non persistée).
            - name: MP_MAX_MESSAGES
              value: "500"
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          # Borné (leçon du lab : tout pod doit avoir des limites). Mailpit est très léger.
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
