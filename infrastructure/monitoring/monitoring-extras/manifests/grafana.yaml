apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: classlab
      namespace: kube-system
      sectionName: https           # listener HTTPS 8443 (TLS wildcard interne)
  hostnames:
    - grafana.classlab.lan
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
