apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: monitoring
spec:
  parentRefs:
    - name: classlab
      namespace: kube-system
      sectionName: https
  hostnames:
    - prometheus.classlab.lan
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-prometheus
          port: 9090
